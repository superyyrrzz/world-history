<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f6efe1" />
  <meta name="description" content="从中国历史出发，通过互动时间轴认识同一时期的世界文明。" />
  <title>历史地图 · 同一个世界</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="历史地图首页">
      <span class="brand-mark">史</span>
      <span>历史地图 <small>世界史互动学习</small></span>
    </a>
  </header>

  <main>
    <section class="hero">
      <div>
        <p class="eyebrow">环游世界 · 同一个世界</p>
        <h1>同一个时代，<br><em>世界在发生什么？</em></h1>
        <p class="intro">拖动年份，观察中国与同期世界文明的延续、交替和分裂状态。</p>
      </div>
      <aside class="mission">
        <span class="mission-icon">分</span>
        <div><small>当前重点</small><strong>统一与分裂</strong><span>三国 · 两晋 · 南北朝</span></div>
      </aside>
    </section>

    <section class="time-machine" aria-labelledby="timelineTitle">
      <div class="time-heading">
        <div>
          <p class="section-number">01 · 历史数据</p>
          <h2 id="timelineTitle">选择一个历史时刻</h2>
        </div>
        <div class="year-display"><span id="yearLabel">221</span><small id="eraLabel">公元前</small></div>
      </div>

      <div class="slider-row">
        <span>公元前300年</span>
        <input id="yearSlider" type="range" min="-300" max="589" step="1" value="-221" aria-label="选择公元前300年至公元589年之间的年份" />
        <span>公元589年</span>
      </div>
      <div class="quick-years" id="quickYears" aria-label="重要年份"></div>

      <div class="world-stage" id="worldStage">
        <div class="chart-key"><span><i class="key-line"></i>当前年份</span><span>中国列的分道表示并立政权</span><b>悬浮方块查看详情</b></div>
        <div class="history-chart">
          <div class="time-axis" id="timeAxis" aria-hidden="true"></div>
          <div class="chart-columns" id="timelineChart"></div>
          <div class="selected-year-line" id="selectedYearLine"><b id="stageYear">公元前221年</b></div>
        </div>
      </div>
      <p class="timeline-hint">← 拖动时间轴，查看当前年份的政权格局 →</p>

      <div class="active-section" aria-labelledby="activeTitle">
        <div class="section-head">
          <div><p class="section-number">02 · 当前年份</p><h2 id="activeTitle">这一年正在发生什么</h2></div>
        </div>
        <div class="active-panel" id="activePanel"></div>
      </div>
    </section>
  </main>

  <footer><span>史</span><p>历史是一个大故事。<br><small>从中国出发，看见整个世界。</small></p><b>公元前300年 - 公元589年</b></footer>
  <script src="app.js"></script>
</body>
</html>
